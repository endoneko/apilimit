<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AIPG - 智能API代理网关</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --primary-glow: rgba(99, 102, 241, 0.25);
            --secondary: #06b6d4;
            --secondary-glow: rgba(6, 182, 212, 0.2);
            --accent: #f43f5e;
            --bg-dark: #f8fafc;
            --bg-card: #ffffff;
            --bg-hover: #f1f5f9;
            --bg-gradient-start: #f0f4ff;
            --bg-gradient-end: #e0e7ff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border-color: #e2e8f0;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.04);
            --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.08), 0 1px 2px -1px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.08), 0 2px 4px -2px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.04);
            --shadow-glow: 0 0 40px -10px var(--primary-glow);
            --radius-sm: 8px;
            --radius: 12px;
            --radius-md: 16px;
            --radius-lg: 20px;
            --radius-xl: 24px;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 50%, #f8fafc 100%);
            background-attachment: fixed;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* 背景装饰 */
        .bg-decoration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
        }

        .bg-circle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.4;
            filter: blur(80px);
        }

        .bg-circle-1 {
            width: 600px;
            height: 600px;
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--secondary) 100%);
            top: -200px;
            right: -200px;
        }

        .bg-circle-2 {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, var(--secondary) 0%, var(--primary-light) 100%);
            bottom: -100px;
            left: -100px;
        }

        /* 登录容器 */
        .login-wrapper {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            position: relative;
            z-index: 1;
            max-height: 100vh;
            overflow-y: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .login-wrapper::-webkit-scrollbar {
            display: none;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg), 0 0 60px -20px rgba(99, 102, 241, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.6);
            padding: 32px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15), 0 0 80px -20px rgba(99, 102, 241, 0.2);
        }

        /* 品牌区域 */
        .brand-section {
            text-align: center;
            margin-bottom: 24px;
        }

        .brand-icon-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 16px;
        }

        .brand-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 40px rgba(99, 102, 241, 0.3);
            position: relative;
            z-index: 1;
        }

        .brand-icon::before {
            content: '';
            position: absolute;
            inset: -3px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: calc(var(--radius-lg) + 3px);
            z-index: -1;
            opacity: 0.4;
            filter: blur(8px);
        }

        .brand-icon i {
            font-size: 28px;
            color: white;
        }

        .brand-title {
            font-size: 22px;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .brand-subtitle {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* 表单样式 */
        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 16px;
            transition: color 0.2s ease;
        }

        .form-control {
            width: 100%;
            padding: 12px 14px 12px 42px;
            border: 1.5px solid var(--border-color);
            background: white;
            color: var(--text-primary);
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .input-wrapper:focus-within .input-icon {
            color: var(--primary);
        }

        .form-control::placeholder {
            color: var(--text-muted);
            font-weight: 400;
        }

        /* 按钮样式 */
        .btn-primary {
            width: 100%;
            padding: 12px 20px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border: none;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 8px;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        /* 警告框 */
        .alert {
            padding: 10px 14px;
            border-radius: var(--radius);
            margin-bottom: 16px;
            font-size: 13px;
            border: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .alert-danger {
            background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
            color: #dc2626;
            border: 1px solid #fca5a5;
        }

        /* 链接区域 */
        .link-section {
            text-align: center;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
        }

        .link-section a {
            color: var(--primary);
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .link-section a:hover {
            color: var(--primary-dark);
        }

        /* 特性标签 */
        .features {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .feature-tag {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 500;
            background: rgba(255, 255, 255, 0.6);
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
        }

        .feature-tag i {
            color: var(--success);
            font-size: 10px;
        }

        /* 演示账号区域 */
        .demo-credentials {
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            border-radius: var(--radius-md);
            padding: 14px;
            margin-top: 16px;
            border: 1px solid #bae6fd;
        }

        .demo-title {
            font-size: 11px;
            font-weight: 700;
            color: #0369a1;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .demo-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 10px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: var(--radius-sm);
            margin-bottom: 6px;
            font-size: 12px;
        }

        .demo-item:last-child {
            margin-bottom: 0;
        }

        .demo-role {
            color: var(--text-secondary);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .demo-role i {
            font-size: 11px;
        }

        .demo-cred {
            font-family: 'Monaco', 'Consolas', monospace;
            color: var(--primary);
            font-weight: 600;
            background: rgba(99, 102, 241, 0.1);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
        }

        /* 响应式设计 */
        @media (max-width: 480px) {
            .login-wrapper {
                padding: 16px;
                max-width: 100%;
            }

            .login-card {
                padding: 24px 20px;
                border-radius: var(--radius-lg);
            }

            .brand-title {
                font-size: 20px;
            }

            .brand-icon {
                width: 56px;
                height: 56px;
            }

            .brand-icon i {
                font-size: 24px;
            }

            .form-control {
                padding: 10px 12px 10px 38px;
                font-size: 16px;
            }

            .input-icon {
                font-size: 14px;
                left: 12px;
            }

            .btn-primary {
                padding: 12px 16px;
            }

            .demo-credentials {
                padding: 12px;
            }

            .demo-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 4px;
            }

            .features {
                gap: 8px;
            }
        }

        @media (max-width: 360px) {
            .login-card {
                padding: 20px 16px;
            }

            .brand-title {
                font-size: 18px;
            }

            .brand-subtitle {
                font-size: 12px;
            }

            .form-group {
                margin-bottom: 12px;
            }
        }

        @media (min-height: 900px) {
            .login-wrapper {
                display: flex;
                align-items: center;
                min-height: 100vh;
            }
        }

        /* 动画效果 */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-card {
            animation: slideUp 0.4s ease-out;
        }

        .form-group {
            animation: slideUp 0.4s ease-out backwards;
        }

        .form-group:nth-child(1) { animation-delay: 0.08s; }
        .form-group:nth-child(2) { animation-delay: 0.16s; }
        .btn-primary { animation: slideUp 0.4s ease-out 0.24s backwards; }
        .link-section { animation: slideUp 0.4s ease-out 0.32s backwards; }
        .features { animation: slideUp 0.4s ease-out 0.4s backwards; }
        .demo-credentials { animation: slideUp 0.4s ease-out 0.48s backwards; }
    </style>
</head>
<body>
    <div class="bg-decoration">
        <div class="bg-circle bg-circle-1"></div>
        <div class="bg-circle bg-circle-2"></div>
    </div>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="brand-section">
                <div class="brand-icon-wrapper">
                    <div class="brand-icon">
                        <img src="{{ url_for('static', filename='logo.png') }}" alt="AIPG Logo" style="width: 36px; height: 36px; object-fit: contain;">
                    </div>
                </div>
                <h1 class="brand-title">AIPG 智能网关</h1>
                <p class="brand-subtitle">统一API管理 · 智能负载均衡 · 安全可靠</p>
            </div>

            {% if error %}
            <div class="alert alert-danger">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <form method="POST" action="{{ url_for('auth.login_page') }}">
                <div class="form-group">
                    <label class="form-label">
                        <i class="bi bi-person-fill"></i> 用户名
                    </label>
                    <div class="input-wrapper">
                        <i class="bi bi-person input-icon"></i>
                        <input type="text" name="username" class="form-control" placeholder="请输入用户名" required autocomplete="username">
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">
                        <i class="bi bi-lock-fill"></i> 密码
                    </label>
                    <div class="input-wrapper">
                        <i class="bi bi-lock input-icon"></i>
                        <input type="password" name="password" class="form-control" placeholder="请输入密码" required autocomplete="current-password">
                    </div>
                </div>

                <button type="submit" class="btn-primary">
                    <i class="bi bi-box-arrow-in-right"></i>
                    登录系统
                </button>
            </form>

            <div class="link-section">
                <a href="{{ url_for('auth.register_page') }}">
                    <i class="bi bi-person-plus"></i>
                    还没有账号？立即注册
                </a>
            </div>

            <div class="features">
                <span class="feature-tag">
                    <i class="bi bi-check-circle-fill"></i> 多模型支持
                </span>
                <span class="feature-tag">
                    <i class="bi bi-check-circle-fill"></i> 智能路由
                </span>
                <span class="feature-tag">
                    <i class="bi bi-check-circle-fill"></i> 实时监控
                </span>

        </div>
    </div>
</body>
</html>
